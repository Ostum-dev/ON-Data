<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تلاوات القرآن الكريم</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f6f9; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            color: #333;
        }
        
        .player-container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
        }
        
        .header-title {
            font-family: 'Amiri', serif;
            font-size: 32px;
            color: #8b6508;
            margin-top: 0;
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #777;
            margin-bottom: 25px;
        }
        
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
            font-size: 15px;
        }
        
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background-color: #fdfdfd;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #333;
            cursor: pointer;
            outline: none;
            transition: 0.3s;
        }
        
        select:focus {
            border-color: #38b1e5;
            box-shadow: 0 0 5px rgba(56, 177, 229, 0.3);
        }
        
        audio {
            width: 100%;
            margin-top: 15px;
            outline: none;
            border-radius: 30px;
        }
        
        .status-message {
            margin-top: 15px;
            font-size: 14px;
            color: #0277bd;
            min-height: 20px;
            font-weight: bold;
        }
        
        .loader {
            display: none;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #38b1e5;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="player-container">
        <h1 class="header-title">القرآن الكريم</h1>
        <div class="subtitle">المكتبة الصوتية الشاملة</div>
        
        <div class="input-group">
            <label for="reciter-select">اختر القارئ:</label>
            <select id="reciter-select" onchange="fetchAndPlayAudio(true)">
                <option value="">جاري تحميل قائمة القراء...</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="surah-select">اختر السورة:</label>
            <select id="surah-select" onchange="fetchAndPlayAudio(true)">
                <option value="">جاري تحميل قائمة السور...</option>
            </select>
        </div>
        
        <div class="loader" id="loading-spinner"></div>
        <div id="status-text" class="status-message"></div>
        
        <audio id="quran-player" controls preload="metadata"></audio>
    </div>

    <script>
        const reciterSelect = document.getElementById('reciter-select');
        const surahSelect = document.getElementById('surah-select');
        const audioPlayer = document.getElementById('quran-player');
        const statusText = document.getElementById('status-text');
        const spinner = document.getElementById('loading-spinner');

        // دالة التهيئة لتحميل القراء والسور عند فتح الصفحة
        async function init() {
            try {
                // جلب قائمة القراء والسور في نفس الوقت
                const [recitersResponse, surahsResponse] = await Promise.all([
                    fetch('https://api.quran.com/api/v4/resources/recitations?language=ar'),
                    fetch('https://api.quran.com/api/v4/chapters?language=ar')
                ]);
                
                const recitersData = await recitersResponse.json();
                const surahsData = await surahsResponse.json();

                // تفريغ القوائم
                reciterSelect.innerHTML = '';
                surahSelect.innerHTML = '';

                // تعبئة قائمة القراء
                // تم ترتيبهم أبجدياً لسهولة البحث
                let reciters = recitersData.recitations.sort((a, b) => 
                    a.translated_name.name.localeCompare(b.translated_name.name, 'ar')
                );
                
                reciters.forEach(reciter => {
                    let option = document.createElement('option');
                    option.value = reciter.id;
                    // إضافة اسم الرواية/النمط إذا كان متوفراً بجانب اسم القارئ
                    let styleText = reciter.style ? ` (${reciter.style})` : '';
                    option.textContent = reciter.translated_name.name + styleText;
                    reciterSelect.appendChild(option);
                });

                // تعبئة قائمة السور
                surahsData.chapters.forEach(chapter => {
                    let option = document.createElement('option');
                    option.value = chapter.id;
                    option.textContent = `${chapter.id}. سورة ${chapter.name_arabic}`;
                    surahSelect.appendChild(option);
                });

                // تحديد القارئ الافتراضي (مشاري العفاسي كمثال، رقمه 7) والسورة (الفاتحة)
                reciterSelect.value = "7"; 
                surahSelect.value = "1";
                
                // إذا لم يتم العثور على العفاسي، يتم اختيار أول قارئ
                if(reciterSelect.selectedIndex === -1) reciterSelect.selectedIndex = 0;

                // تحميل الصوت الأول بدون تشغيل تلقائي مزعج
                fetchAndPlayAudio(false); 

            } catch (error) {
                statusText.style.color = "red";
                statusText.textContent = 'حدث خطأ في الاتصال، يرجى التأكد من توفر الإنترنت.';
            }
        }

        // دالة جلب الملف الصوتي وتشغيله
        async function fetchAndPlayAudio(autoPlay = false) {
            const reciterId = reciterSelect.value;
            const surahId = surahSelect.value;
            
            if (!reciterId || !surahId) return;

            statusText.textContent = '';
            spinner.style.display = 'block';
            audioPlayer.style.opacity = '0.5';
            
            try {
                const response = await fetch(`https://api.quran.com/api/v4/chapter_recitations/${reciterId}/${surahId}`);
                const data = await response.json();
                
                if (data.audio_file && data.audio_file.audio_url) {
                    let audioUrl = data.audio_file.audio_url;
                    
                    // بعض الروابط تأتي بدون https في البداية، هذا الشرط لإصلاحها
                    if(audioUrl.startsWith('//')) {
                        audioUrl = 'https:' + audioUrl;
                    }
                    
                    audioPlayer.src = audioUrl;
                    
                    if (autoPlay) {
                        // محاولة التشغيل التلقائي (بعض المتصفحات تمنعه إلا بعد تفاعل المستخدم)
                        audioPlayer.play().catch(e => {
                            statusText.textContent = 'اضغط على زر التشغيل للبدء';
                        });
                    }
                } else {
                    audioPlayer.src = '';
                    statusText.style.color = "red";
                    statusText.textContent = 'عذراً، التلاوة غير متوفرة لهذا القارئ أو هذه السورة حالياً.';
                }
            } catch (error) {
                statusText.style.color = "red";
                statusText.textContent = 'حدث خطأ أثناء محاولة جلب الصوت.';
            } finally {
                spinner.style.display = 'none';
                audioPlayer.style.opacity = '1';
            }
        }

        // تشغيل التهيئة عند فتح الصفحة
        window.onload = init;
        
        // تشغيل السورة التالية تلقائياً عند انتهاء السورة الحالية
        audioPlayer.addEventListener('ended', function() {
            if (surahSelect.selectedIndex < surahSelect.options.length - 1) {
                surahSelect.selectedIndex += 1;
                fetchAndPlayAudio(true);
            }
        });
    </script>
</body>
</html>
