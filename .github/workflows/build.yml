name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Generate All Android Project Files Automatically
      run: |
        # 1. إنشاء هيكل المجلدات بالكامل داخل الخادم
        mkdir -p app/src/main/java/com/alquran/almobin
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/mipmap-hdpi
        
        # 2. توليد ملف الإعدادات settings.gradle
        cat << 'EOF' > settings.gradle
        include ':app'
        rootProject.name = "Alquran Almobin"
        EOF
        
        # 3. توليد ملف build.gradle الرئيسي
        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.0.2'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF
        
        # 4. توليد ملف إعدادات التطبيق app/build.gradle
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.alquran.almobin'
            compileSdk 33
            defaultConfig {
                applicationId "com.alquran.almobin"
                minSdk 21
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF
        
        # 5. توليد ملف واجهة الشاشة activity_main.xml
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent">
            <WebView
                android:id="@+id/webView"
                android:layout_width="match_parent"
                android:layout_height="match_parent" />
        </RelativeLayout>
        EOF
        
        # 6. توليد ملف الصلاحيات والاسم العربي AndroidManifest.xml
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.WAKE_LOCK" />
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="القرآن المبين"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.NoActionBar"
                android:usesCleartextTraffic="true">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:configChanges="orientation|screenSize|keyboardHidden">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        # 7. توليد كود الجافا المشغل للموقع والصوت المستمر MainActivity.java
        cat << 'EOF' > app/src/main/java/com/alquran/almobin/MainActivity.java
        package com.alquran.almobin;
        import android.annotation.SuppressLint;
        import android.os.Bundle;
        import android.view.WindowManager;
        import android.webkit.WebChromeClient;
        import android.webkit.WebSettings;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import androidx.appcompat.app.AppCompatActivity;
        
        public class MainActivity extends AppCompatActivity {
            private WebView webView;
            @SuppressLint("SetJavaScriptEnabled")
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                setContentView(R.layout.activity_main);
                webView = findViewById(R.id.webView);
                WebSettings webSettings = webView.getSettings();
                webSettings.setJavaScriptEnabled(true);
                webSettings.setDomStorageEnabled(true);
                webSettings.setDatabaseEnabled(true);
                webSettings.setMediaPlaybackRequiresUserGesture(false);
                webSettings.setCacheMode(WebSettings.LOAD_DEFAULT);
                webView.setWebViewClient(new WebViewClient());
                webView.setWebChromeClient(new WebChromeClient());
                webView.loadUrl("https://alquran-almobin.blogspot.com/?m=1");
            }
            @Override
            public void onBackPressed() {
                if (webView.canGoBack()) {
                    webView.goBack();
                } else {
                    super.onBackPressed();
                }
            }
        }
        EOF

    - name: Auto Handle App Logo
      run: |
        # فحص وجود شعارك المرفوع وتثبيته كأيقونة رسمية
        if [ -f "logo.png" ]; then
          cp logo.png app/src/main/res/mipmap-hdpi/ic_launcher.png
        elif [ -f "logo.jpg" ]; then
          cp logo.jpg app/src/main/res/mipmap-hdpi/ic_launcher.png
        elif [ -f "logo.jpeg" ]; then
          cp logo.jpeg app/src/main/res/mipmap-hdpi/ic_launcher.png
        else
          # إذا لم ترفع الصورة بعد، يضع أيقونة مؤقتة حتى لا يفشل البناء
          touch app/src/main/res/mipmap-hdpi/ic_launcher.png
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle Build Tool
      uses: gradle/gradle-build-action@v2

    - name: Build Final APK
      run: gradle assembleDebug

    - name: Upload APK File
      uses: actions/upload-artifact@v3
      with:
        name: Alquran-Almobin-APK
        path: app/build/outputs/apk/debug/*.apk
