name: Build Android APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build APK
      run: |
        curl -s "https://raw.githubusercontent.com/gradle/gradle-build-action/main/generate-gradle-wrapper.sh" | bash
        mkdir -p app/src/main/java/com/alquran/almobin
        echo "apply plugin: 'com.android.application'
        android { namespace 'com.alquran.almobin'; compileSdk 33; defaultConfig { applicationId 'com.alquran.almobin'; minSdk 21; targetSdk 33 } }" > app/build.gradle
        echo "include ':app'" > settings.gradle
        echo "buildscript { dependencies { classpath 'com.android.tools.build:gradle:8.1.0' } }" > build.gradle
        ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: Alquran-Almobin
        path: app/build/outputs/apk/debug/*.apk
