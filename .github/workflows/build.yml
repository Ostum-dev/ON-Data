name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate App Structure
      run: |
        mkdir -p app/src/main/java/com/alquran/almobin
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/mipmap-hdpi
        
        echo "include ':app'" > settings.gradle
        echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" > gradle.properties
        
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.alquran.almobin'
            compileSdk 33
            defaultConfig {
                applicationId "com.alquran.almobin"
                minSdk 21
                targetSdk 33
            }
        }
        dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
        EOF

        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:label="القرآن المبين" android:icon="@mipmap/ic_launcher" android:usesCleartextTraffic="true">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        cat << 'EOF' > app/src/main/java/com/alquran/almobin/MainActivity.java
        package com.alquran.almobin;
        import android.os.Bundle;
        import android.webkit.WebView;
        import androidx.appcompat.app.AppCompatActivity;
        public class MainActivity extends AppCompatActivity {
            @Override protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                webView.getSettings().setJavaScriptEnabled(true);
                webView.loadUrl("https://alquran-almobin.blogspot.com/?m=1");
                setContentView(webView);
            }
        }
        EOF

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Alquran-Almobin
        path: app/build/outputs/apk/debug/*.apk
