<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime App</title>
    
    <style>
        /* إعدادات عامة */
        :root {
            --bg-color: #ffffff; /* خلفية بيضاء للتطبيق */
            --header-bg: #000000; /* شريط علوي أسود */
            --text-dark: #222222;
            --text-light: #ffffff;
            --border-color: #eeeeee;
        }

        body { 
            background-color: var(--bg-color); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* الشريط العلوي الأسود */
        .navbar { 
            background-color: var(--header-bg); 
            color: var(--text-light); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 0 15px; 
            height: 60px;
            position: fixed;
            top: 0; width: 100%; box-sizing: border-box;
            z-index: 1000;
        }

        .icon-btn { 
            background: none; border: none; color: white; 
            font-size: 24px; cursor: pointer; padding: 10px;
        }

        .navbar h1 { font-size: 20px; margin: 0; font-weight: bold; }

        /* خلفية مظللة عند فتح القائمة */
        .overlay {
            position: fixed; top: 60px; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 998;
            opacity: 0; visibility: hidden;
            transition: 0.3s;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        /* القائمة الجانبية (تصميم أنمي سلاير) */
        .sidebar { 
            position: fixed; right: -280px; top: 60px; 
            width: 280px; height: calc(100% - 60px); 
            background: var(--bg-color); 
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            transition: right 0.3s ease-in-out; 
            z-index: 999;
            overflow-y: auto;
        }

        .sidebar.active { right: 0; }

        .sidebar-menu { 
            list-style: none; /* إزالة النقاط */
            padding: 0; margin: 0; 
        }

        .sidebar-menu li a {
            display: flex; align-items: center;
            padding: 15px 20px;
            color: var(--text-dark);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }

        .sidebar-menu li a:hover { background-color: #f9f9f9; }
        
        .sidebar-menu li a .icon { 
            margin-left: 15px; /* مسافة بين الأيقونة والنص */
            font-size: 20px; width: 25px; text-align: center; color: #555;
        }

        /* فاصل سميك بين الأقسام */
        .menu-divider { height: 8px; background-color: #f4f4f4; border-bottom: 1px solid var(--border-color); }

        /* منطقة المحتوى */
        main { margin-top: 80px; padding: 15px; }
        
        .anime-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 15px; 
        }
        .card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card h3 { font-size: 14px; padding: 10px; margin: 0; text-align: center; color: #333; }
    </style>
</head>
<body>

    <header class="navbar">
        <button id="menu-btn" class="icon-btn">☰</button>
        <h1>Anime App</h1>
        <button id="search-btn" class="icon-btn">🔍</button>
    </header>

    <div id="overlay" class="overlay"></div>

    <nav id="sidebar" class="sidebar">
        <ul class="sidebar-menu">
            <li><a href="#"><span class="icon">🔥</span> اخر التحديثات</a></li>
            <li><a href="#"><span class="icon">📋</span> لائحة الانمي</a></li>
            <li><a href="#"><span class="icon">📅</span> المواسم</a></li>
            <li class="menu-divider"></li>
            <li><a href="#"><span class="icon">📊</span> التقييم العالمي</a></li>
            <li><a href="#"><span class="icon">📈</span> التقييم العربي</a></li>
            <li class="menu-divider"></li>
            <li><a href="#"><span class="icon">❤️</span> أنمياتي المفضلة</a></li>
            <li><a href="#"><span class="icon">⚙️</span> الاعدادات</a></li>
        </ul>
    </nav>

    <main id="anime-container" class="anime-grid">
        </main>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        // دالة فتح وإغلاق القائمة
        function toggleMenu() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // ربط الأزرار بالدالة
        menuBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu); // إغلاق عند الضغط خارج القائمة

        // جلب البيانات (كما كتبناها سابقاً)
        async function loadAnime() {
            try {
                const response = await fetch('data.json');
                const animes = await response.json();
                const container = document.getElementById('anime-container');

                animes.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${anime.img || 'https://via.placeholder.com/150'}" alt="${anime.title}">
                        <h3>${anime.title}</h3>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.log("في انتظار بيانات data.json");
            }
        }

        loadAnime();
    </script>
</body>
</html>
