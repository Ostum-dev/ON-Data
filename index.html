<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القرآن المبين</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital@0;1&display=swap" rel="stylesheet">
    <style>
        /* ... (احتفظ بنفس التنسيقات السابقة) ... */
        html, body { height: 100%; margin: 0; padding: 0; background-color: #f4f6f9; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100%; max-width: 800px; margin: auto; padding: 10px; box-sizing: border-box; position: relative; }
        
        /* تنسيق زر القائمة الجديد */
        .menu-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #38b1e5;
            z-index: 1000;
            background: #fff;
            padding: 5px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-decoration: none;
        }

        .tabs { display: flex; justify-content: center; background: #fff; margin-bottom: 10px; border-bottom: 2px solid #e0e0e0; border-radius: 8px; flex-shrink: 0; margin-top: 50px;}
        .tab { flex: 1; text-align: center; padding: 12px; font-size: 18px; font-weight: bold; cursor: pointer; color: #555; transition: 0.3s; }
        .tab.active { color: #38b1e5; border-bottom: 4px solid #38b1e5; background: #f0f8ff; border-radius: 8px;}
        .back-arrow { display: none; align-self: flex-start; font-size: 35px; color: #555; cursor: pointer; padding: 0px 10px; margin-bottom: 10px; transition: 0.2s; flex-shrink: 0; line-height: 1; }
        .back-arrow:hover { color: #38b1e5; }
        /* ... (باقي التنسيقات كما هي) ... */
    </style>
</head>
<body>
    <div class="container">
        <!-- زر القائمة المضاف -->
        <a href="audio.html" class="menu-btn" title="أصوات القراء">☰</a>

        <div id="navigation-tabs" class="tabs">
            <div id="tab-chapters" class="tab active" onclick="switchTab('chapters')">فهرس السور</div>
            <div id="tab-juzs" class="tab" onclick="switchTab('juzs')">فهرس الأجزاء</div>
        </div>
        <div id="back-btn" class="back-arrow" onclick="goBack()">→</div>
        <div id="content-area">... جاري التحميل ...</div>
        <div id="mushaf-slider-area" class="mushaf-slider"></div>
    </div>
    <!-- ... (سكربت الصفحة كما هو) ... -->
</body>
</html>
