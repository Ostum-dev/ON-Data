<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime App</title>

<style>
body{
    margin:0;
    font-family:Tahoma,sans-serif;
    background:#fff;
}

.topbar{
    background:#000;
    color:#fff;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
}

.icon-btn{
    background:none;
    border:none;
    color:white;
    font-size:24px;
    cursor:pointer;
}

.drawer{
    position:fixed;
    top:0;
    right:-280px;
    width:280px;
    height:100%;
    background:white;
    transition:.3s;
    box-shadow:-3px 0 10px rgba(0,0,0,.2);
}

.drawer.open{
    right:0;
}

.drawer ul{
    list-style:none;
    padding:0;
    margin-top:70px;
}

.drawer li{
    padding:15px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.content{
    padding:15px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
}

.card{
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    background:white;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.title{
    font-size:15px;
    font-weight:bold;
}

.rating{
    color:orange;
    margin-top:5px;
}
</style>
</head>
<body>

<div class="topbar">
    <button class="icon-btn" onclick="toggleMenu()">☰</button>
    <h2>آخر التحديثات</h2>
    <button class="icon-btn">🔍</button>
</div>

<div class="drawer" id="drawer">
    <ul>
        <li>آخر التحديثات</li>
        <li>لائحة الأنمي</li>
        <li>المواسم</li>
        <li>التقييم العالمي</li>
        <li>التقييم العربي</li>
        <li>قائمتي</li>
        <li>المفضلة</li>
        <li>آخر المشاهدات</li>
        <li>التحميلات</li>
        <li>التوصيات</li>
        <li>الإعدادات</li>
    </ul>
</div>

<div class="content">

<div class="grid" id="animeGrid"></div>

</div>

<script>

function toggleMenu(){
    document.getElementById("drawer").classList.toggle("open");
}

const animeData = [
{
title:"Solo Leveling",
image:"https://picsum.photos/300/450?1",
rating:"8.9"
},
{
title:"Attack on Titan",
image:"https://picsum.photos/300/450?2",
rating:"9.1"
},
{
title:"Jujutsu Kaisen",
image:"https://picsum.photos/300/450?3",
rating:"8.7"
}
];

const grid = document.getElementById("animeGrid");

animeData.forEach(anime=>{

grid.innerHTML += `
<div class="card">
<img src="${anime.image}">
<div class="info">
<div class="title">${anime.title}</div>
<div class="rating">⭐ ${anime.rating}</div>
<button onclick="openExternalPlayer()">
مشاهدة
</button>
</div>
</div>
`;

});

function openExternalPlayer(){

const url = "https://example.com/video.mp4";

window.open(url,"_blank");

}

</script>

</body>
</html>
