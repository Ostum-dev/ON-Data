<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime App</title>
    
    <style>
        body { background-color: #ffffff; font-family: sans-serif; margin: 0; }
        .navbar { 
            background-color: #000000; color: white; 
            display: flex; justify-content: space-between; padding: 15px; 
        }
        .icon-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .sidebar { 
            position: fixed; right: -250px; top: 60px; width: 250px; height: 100%; 
            background: #f4f4f4; transition: 0.3s; padding-top: 20px;
        }
        .sidebar.active { right: 0; }
        .anime-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 15px; padding: 20px; 
        }
        .card { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
    </style>
</head>
<body>

    <header class="navbar">
        <button id="menu-btn" class="icon-btn">☰</button>
        <h1>Anime App</h1>
        <button id="search-btn" class="icon-btn">🔍</button>
    </header>

    <nav id="sidebar" class="sidebar">
        <ul>
            <li>أحدث التحديثات</li>
            <li>لائحة الأنمي</li>
            <li>المواسم</li>
            <li>الإعدادات</li>
        </ul>
    </nav>

    <main id="anime-container" class="anime-grid">
        </main>

    <script>
        document.getElementById('menu-btn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('active');
        });

        async function loadAnime() {
            try {
                const response = await fetch('data.json');
                const animes = await response.json();
                const container = document.getElementById('anime-container');

                animes.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${anime.img}" alt="${anime.title}">
                        <h3>${anime.title}</h3>
                        <button onclick="watchExternally('${anime.link}')">مشاهدة بمشغل خارجي</button>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("لم يتم العثور على ملف data.json بعد", error);
            }
        }

        function watchExternally(url) {
            window.location.href = `intent:${url}#Intent;scheme=http;package=com.mxtech.videoplayer.ad;end`;
        }

        loadAnime();
    </script>
</body>
</html>
