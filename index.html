<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المصحف الميسر</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; text-align: center; }
        .surah { background: #1e1e1e; padding: 15px; margin: 10px; cursor: pointer; border-radius: 8px; border: 1px solid #333; }
    </style>
</head>
<body>
    <h1>قائمة السور</h1>
    <audio id="audioPlayer" controls style="width: 100%; margin-top: 20px;"></audio>
    <div id="list"></div>

    <script>
        // ضع هنا رابط مشروعك من سوبابيس (بدون شرطة مائلة في النهاية)
        const PROJECT_URL = "https://dkwmbyqjsjaqvokfbzfk.supabase.co";
        const BUCKET = "quran-audio";

        const surahs = [
            { id: "001", name: "الفاتحة" },
            { id: "002", name: "البقرة" }
        ];

        const list = document.getElementById('list');
        const player = document.getElementById('audioPlayer');

        surahs.forEach(s => {
            let div = document.createElement('div');
            div.className = 'surah';
            div.innerText = "سورة " + s.name;
            div.onclick = () => {
                // الرابط المباشر للملف
                player.src = `${PROJECT_URL}/storage/v1/object/public/${BUCKET}/${s.id}.mp3`;
                player.play();
            };
            list.appendChild(div);
        });
    </script>
</body>
</html>
