<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>أنمي عربي</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    .sidebar { transition: all 0.3s; }
    .anime-card { transition: transform 0.2s; }
    .anime-card:hover { transform: scale(1.05); }
  </style>
</head>
<body class="bg-white text-gray-900">

  <!-- Top Bar (أبيض مع شريط أسود) -->
  <header class="bg-black text-white sticky top-0 z-50">
    <div class="max-w-screen-xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="menuBtn" class="text-2xl p-2 hover:bg-gray-800 rounded-lg">
          <i class="fas fa-bars"></i>
        </button>
        <h1 class="text-2xl font-bold">أنمي عربي</h1>
      </div>
      
      <div class="flex-1 max-w-md mx-4">
        <div class="relative">
          <input id="searchInput" type="text" 
                 class="w-full bg-gray-900 text-white rounded-full py-2 px-5 pl-12 focus:outline-none"
                 placeholder="ابحث عن أنمي..."/>
          <i class="fas fa-search absolute left-4 top-3 text-gray-400"></i>
        </div>
      </div>

      <button class="text-2xl p-2 hover:bg-gray-800 rounded-lg">
        <i class="fas fa-cog"></i>
      </button>
    </div>
  </header>

  <div class="flex min-h-screen">

    <!-- Sidebar على اليمين -->
    <div id="sidebar" class="sidebar fixed top-0 right-0 h-full w-72 bg-gray-900 text-white shadow-2xl transform translate-x-full z-50">
      <div class="p-6">
        <button id="closeSidebar" class="text-3xl mb-6">&times;</button>
        
        <nav class="space-y-6">
          <a href="#" class="flex items-center gap-3 text-lg hover:text-blue-400"><i class="fas fa-fire"></i> آخر التحديثات</a>
          <a href="#" class="flex items-center gap-3 text-lg hover:text-blue-400"><i class="fas fa-list"></i> لائحة الأنمي</a>
          <a href="#" class="flex items-center gap-3 text-lg hover:text-blue-400"><i class="fas fa-calendar"></i> المواسم</a>
          <a href="#" class="flex items-center gap-3 text-lg hover:text-blue-400"><i class="fas fa-chart-bar"></i> التقييم العالمي</a>
          <a href="#" class="flex items-center gap-3 text-lg hover:text-blue-400"><i class="fas fa-heart"></i> أنمياتي المفضلة</a>
          <a href="#" class="flex items-center gap-3 text-lg hover:text-blue-400"><i class="fas fa-clock"></i> آخر المشاهدات</a>
          <a href="#" class="flex items-center gap-3 text-lg hover:text-blue-400"><i class="fas fa-download"></i> تحميلاتي</a>
        </nav>
      </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 p-4 max-w-screen-xl mx-auto">
      <h2 class="text-2xl font-bold mb-6">آخر التحديثات</h2>
      
      <div id="animeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
        <!-- سيتم ملؤها بالـ JavaScript -->
      </div>
    </main>
  </div>

  <!-- Modal تفاصيل الأنمي -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-white text-black max-w-lg w-full mx-4 rounded-2xl overflow-hidden">
      <div id="modalContent" class="p-6"></div>
    </div>
  </div>

  <script>
    // بيانات تجريبية (مأخوذة من anime3rb + الصور)
    const animes = [
      {
        id: 1,
        title: "Tensei shitara Slime Datta Ken",
        image: "https://picsum.photos/id/1015/300/400",
        rating: 8.3,
        episode: "الحلقة 9"
      },
      {
        id: 2,
        title: "Mata Korosare...",
        image: "https://picsum.photos/id/237/300/400",
        rating: 8.1,
        episode: "الحلقة 10"
      },
      {
        id: 3,
        title: "Koor i no Jouheki",
        image: "https://picsum.photos/id/180/300/400",
        rating: 8.18,
        episode: "الحلقة 10"
      },
      {
        id: 4,
        title: "Otonari no Tenshi",
        image: "https://picsum.photos/id/201/300/400",
        rating: 8.22,
        episode: "الحلقة 10"
      },
      {
        id: 5,
        title: "Jishou Akuyaku Reijou",
        image: "https://picsum.photos/id/251/300/400",
        rating: 8.19,
        episode: "الحلقة 10"
      }
    ];

    // عرض الأنميات
    function renderAnimes(filteredAnimes = animes) {
      const grid = document.getElementById('animeGrid');
      grid.innerHTML = '';

      filteredAnimes.forEach(anime => {
        const card = document.createElement('div');
        card.className = 'anime-card bg-white rounded-xl overflow-hidden shadow-md cursor-pointer';
        card.innerHTML = `
          <img src="${anime.image}" class="w-full h-72 object-cover" alt="${anime.title}">
          <div class="p-3">
            <h3 class="font-semibold text-sm line-clamp-2">${anime.title}</h3>
            <div class="flex justify-between items-center mt-2 text-xs">
              <span class="text-yellow-500">★ ${anime.rating}</span>
              <span class="text-gray-500">${anime.episode}</span>
            </div>
          </div>
        `;
        card.onclick = () => showDetails(anime);
        grid.appendChild(card);
      });
    }

    // عرض تفاصيل الأنمي + زر تشغيل خارجي
    function showDetails(anime) {
      const modal = document.getElementById('modal');
      const content = document.getElementById('modalContent');
      
      content.innerHTML = `
        <button onclick="closeModal()" class="float-right text-3xl">×</button>
        <img src="${anime.image}" class="w-full h-80 object-cover rounded-xl mb-4">
        <h2 class="text-2xl font-bold">${anime.title}</h2>
        <p class="text-yellow-500 text-lg">★ ${anime.rating}</p>
        <p class="mt-4 text-gray-600">الحلقة ${anime.episode}</p>
        
        <div class="mt-6 space-y-3">
          <button onclick="watchEpisode()" 
                  class="w-full bg-black text-white py-4 rounded-xl text-lg font-medium flex items-center justify-center gap-2">
            <i class="fas fa-play"></i> مشاهدة الحلقة (مشغل خارجي)
          </button>
          <button class="w-full border border-gray-300 py-3 rounded-xl">إضافة إلى المفضلة</button>
        </div>
      `;
      modal.classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function watchEpisode() {
      alert("جاري فتح المشغل الخارجي...\n(في التطبيق الحقيقي سيتم فتح رابط من anime3rb.com)");
      // مثال: window.open("https://anime3rb.com/...", "_blank");
      closeModal();
    }

    // البحث
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = animes.filter(a => a.title.toLowerCase().includes(term));
      renderAnimes(filtered);
    });

    // Sidebar
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    const closeBtn = document.getElementById('closeSidebar');

    menuBtn.onclick = () => sidebar.style.transform = 'translateX(0)';
    closeBtn.onclick = () => sidebar.style.transform = 'translateX(100%)';

    // تشغيل التطبيق
    renderAnimes();
  </script>
</body>
</html>
