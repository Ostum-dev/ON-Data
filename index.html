<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المصحف الشريف</title>
    <style>
        body { font-family: 'Amiri', serif; background: #f9f9f9; padding: 15px; }
        .tab-btn { padding: 10px; cursor: pointer; background: #ddd; border: none; width: 48%; }
        .tab-content { display: none; margin-top: 20px; }
        .active { display: block; }
        .item { background: #fff; padding: 15px; margin-bottom: 5px; border-bottom: 1px solid #eee; text-align: right; }
        .type { color: #888; font-size: 14px; margin-right: 10px; }
    </style>
</head>
<body>

    <button class="tab-btn" onclick="showTab('surahs')">السور</button>
    <button class="tab-btn" onclick="showTab('parts')">الأجزاء</button>

    <div id="surahs" class="tab-content active">
        <div class="item">١. الفاتحة <span class="type">مكية</span></div>
        <div class="item">٢. البقرة <span class="type">مدنية</span></div>
        </div>

    <div id="parts" class="tab-content">
        <div class="item">الجزء ١</div>
        <div class="item">الجزء ٢</div>
        </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
