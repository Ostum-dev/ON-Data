<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القرآن المبين</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f6f9;
            --container-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --border-color: #e0e0e0;
            --accent-color: #0288d1;
            --header-gold: #8b6508;
            --item-bg: #f9f9f9;
            --active-ayah: #fff59d;
        }

        .dark-mode {
            --bg-color: #1a1a1a;
            --container-bg: #222222;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
            --accent-color: #38b1e5;
            --header-gold: #daa520;
            --item-bg: #282828;
            --active-ayah: #443e1d;
        }

        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background 0.3s, color 0.3s; user-select: none; -webkit-user-select: none; }
        
        .container { display: flex; flex-direction: column; height: 100%; max-width: 600px; margin: auto; background: var(--container-bg); position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.2); transition: background 0.3s; }
        
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .app-title { font-size: 22px; font-weight: normal; color: var(--text-color); } 
        .header-icons { display: flex; gap: 20px; font-size: 20px; cursor: pointer; align-items: center; }
        .icon-btn { transition: 0.2s; }
        .icon-btn:hover { transform: scale(1.1); color: var(--accent-color); }
        
        .tabs { display: flex; border-bottom: 2px solid var(--border-color); flex-shrink: 0; background: var(--container-bg); }
        .tab { flex: 1; text-align: center; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; color: var(--text-muted); transition: 0.3s; position: relative; }
        .tab.active { color: var(--accent-color); }
        .tab.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 3px; background: var(--accent-color); }

        .swiper-view { flex: 1; display: flex; width: 200%; transition: transform 0.3s ease-out; height: 100%; }
        .list-panel { width: 50%; height: 100%; overflow-y: auto; padding: 10px 20px; box-sizing: border-box; }
        .list-panel::-webkit-scrollbar { display: none; }

        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 18px 15px; background: var(--item-bg); margin-bottom: 2px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid var(--border-color); }
        .item-row:hover { background: var(--border-color); }
        .item-center { display: flex; flex-direction: column; align-items: center; text-align: center; flex: 1; }
        .item-main-title { font-family: 'Amiri', serif; font-size: 20px; font-weight: bold; color: var(--text-color); }
        .item-sub-title { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .item-side-num { font-size: 16px; color: var(--text-muted); width: 40px; text-align: right; }

        .back-btn { display: none; padding: 15px; font-size: 18px; cursor: pointer; align-self: flex-start; color: var(--accent-color); font-weight: bold; }
        .mushaf-slider { display: none; flex: 1; width: 100%; overflow-x: auto; scroll-snap-type: x mandatory; direction: rtl; }
        .mushaf-page { min-width: 100%; height: 100%; box-sizing: border-box; scroll-snap-align: start; padding: 20px; overflow-y: auto; text-align: center; }
        .mushaf-page::-webkit-scrollbar { display: none; }
        .mushaf-surah-title { font-family: 'Amiri Quran', serif; font-size: 30px; color: var(--header-gold); margin-bottom: 20px; border: 3px double var(--header-gold); padding: 10px; border-radius: 8px; }
        .bismillah { font-family: 'Amiri Quran', serif; font-size: 26px; display: block; margin-bottom: 20px; }
        
        .ayah-span { font-family: 'Amiri Quran', serif; font-size: 26px; line-height: 2.2; cursor: pointer; padding: 2px 6px; border-radius: 4px; display: inline; transition: background-color 0.2s; -webkit-tap-highlight-color: transparent; }
        .ayah-span.active-reciting { background-color: var(--active-ayah) !important; border-radius: 4px; color: var(--text-color); }
        .ayah-num { font-family: 'Amiri Quran', serif; color: #b22222; font-size: 22px; margin: 0 3px; display: inline-block; }

        .audio-bar { position: absolute; bottom: -220px; left: 0; right: 0; background: var(--container-bg); border-top: 1px solid var(--border-color); padding: 15px 20px; transition: bottom 0.3s cubic-bezier(0.1, 0.4, 0.2, 1); z-index: 2500; display: flex; flex-direction: column; align-items: center; gap: 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .audio-bar.active { bottom: 0; }
        
        .audio-info-row { width: 100%; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        #audio-title { font-weight: bold; color: var(--accent-color); }
        
        .audio-controls-mid { display: flex; align-items: center; justify-content: center; gap: 25px; margin: 5px 0; width: 100%; }
        .control-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: var(--text-color); transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .control-btn:hover { color: var(--accent-color); transform: scale(1.1); }
        .play-pause-btn { font-size: 36px; color: var(--accent-color); }
        
        .repeat-selector { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); background: var(--item-bg); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border-color); }
        .repeat-selector select { background: transparent; color: var(--text-color); border: none; font-size: 13px; font-weight: bold; cursor: pointer; outline: none; }
    </style>
</head>
<body class="dark-mode">

    <div class="container" id="app-container">
        <div class="app-header" id="main-header">
            <div class="app-title">القرآن المبين</div>
            <div class="header-icons">
                <span class="icon-btn" onclick="alert('قريباً')" title="المرجعيات">🔖</span>
                <span class="icon-btn" onclick="alert('يمكنك إضافة الإعدادات لاحقاً')" title="الإعدادات">⚙️</span>
            </div>
        </div>

        <div class="tabs" id="main-tabs">
            <div class="tab active" id="tab-0" onclick="setPanelIndex(0)">سورة</div>
            <div class="tab" id="tab-1" onclick="setPanelIndex(1)">الجزء</div>
        </div>

        <div class="back-btn" id="back-button" onclick="exitMushafView()">→ العودة للفهرس</div>

        <div class="swiper-view" id="swiper-view" ontouchstart="handleTouchStart(event)" ontouchmove="handleTouchMove(event)" ontouchend="handleTouchEnd()">
            <div class="list-panel" id="panel-chapters">
                <div style="text-align:center; padding:20px;">جاري تحميل السور...</div>
            </div>
            <div class="list-panel" id="panel-juzs">
                <div style="text-align:center; padding:20px;">جاري إعداد الأجزاء...</div>
            </div>
        </div>

        <div class="mushaf-slider" id="mushaf-slider"></div>

        <div class="audio-bar" id="audio-bar" onclick="event.stopPropagation();">
            <div class="audio-info-row">
                <div id="audio-title">سورة الفاتحة</div>
                <div class="repeat-selector">
                    <span>تكرار:</span>
                    <select id="verse-repeat-select">
                        <option value="1">مرة واحدة</option>
                        <option value="2">مرتين</option>
                        <option value="3">٣ مرات</option>
                    </select>
                </div>
            </div>

            <div class="audio-controls-mid">
                <button class="control-btn" onclick="playNextOrPrevAyah(-1)">⏮️</button>
                <button class="control-btn play-pause-btn" id="main-play-btn" onclick="togglePlayPause()">▶️</button>
                <button class="control-btn" onclick="playNextOrPrevAyah(1)">⏭️</button>
            </div>
            
            <audio id="audio-player" style="display:none;"></audio>
        </div>
    </div>

    <script>
        // ✅ تم ضبط الرابط تلقائياً بناءً على بيانات مشروعك في Supabase
        const SUPABASE_STORAGE_URL = "https://dkwmbyqjsjaqvokfbzfk.supabase.co/storage/v1/object/public/quran-audio/";

        let currentPanelIndex = 0;
        let touchStartX = 0;
        let touchEndX = 0;
        let currentView = 'index';
        let currentVerseIndex = 0;
        let versesElementsArray = [];
        let repeatCounter = 1; 

        const swiperView = document.getElementById('swiper-view');
        const audioBar = document.getElementById('audio-bar');
        const audioPlayer = document.getElementById('audio-player');
        const mushafSlider = document.getElementById('mushaf-slider');
        const mainPlayBtn = document.getElementById('main-play-btn');

        const surahNamesList = [
            "الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس",
            "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه",
            "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم",
            "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر",
            "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق",
            "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة",
            "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج",
            "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس",
            "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد",
            "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات",
            "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر",
            "المسد", "الإخلاص", "الفلق", "الناس"
        ];

        window.onload = () => {
            loadChaptersIndex();
            loadJuzsIndex();
            
            mushafSlider.addEventListener('click', (e) => {
                if (currentView === 'surah' && !e.target.classList.contains('ayah-span') && !e.target.classList.contains('ayah-num')) {
                    audioBar.classList.toggle('active');
                }
            });
        };

        function handleTouchStart(e) { touchStartX = e.changedTouches[0].screenX; }
        function handleTouchMove(e) { touchEndX = e.changedTouches[0].screenX; }
        function handleTouchEnd() {
            let diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 70) {
                if (diff > 0 && currentPanelIndex === 0) setPanelIndex(1);
                if (diff < 0 && currentPanelIndex === 1) setPanelIndex(0);
            }
        }

        function setPanelIndex(index) {
            currentPanelIndex = index;
            document.getElementById('tab-0').classList.toggle('active', index === 0);
            document.getElementById('tab-1').classList.toggle('active', index === 1);
            swiperView.style.transform = `translateX(${index * 50}%)`;
        }

        function loadChaptersIndex() {
            let area = document.getElementById('panel-chapters');
            fetch('https://api.quran.com/api/v4/chapters?language=ar')
                .then(r => r.json())
                .then(data => {
                    let html = '';
                    data.chapters.forEach(c => {
                        html += `
                        <div class="item-row" onclick="openSurahContent(${c.id}, '${c.name_arabic}')">
                            <span class="item-side-num">${convertToArabicNo(c.id)}</span>
                            <div class="item-center">
                                <span class="item-main-title">سُورَةُ ${c.name_arabic}</span>
                                <span class="item-sub-title">${c.revelation_place === 'makkah'?'مكية':'مدنية'} - ${convertToArabicNo(c.verses_count)} آية</span>
                            </div>
                        </div>`;
                    });
                    area.innerHTML = html;
                });
        }

        function loadJuzsIndex() {
            let area = document.getElementById('panel-juzs');
            let html = '';
            for(let i=1; i<=30; i++) {
                html += `
                <div class="item-row" onclick="openJuzContent(${i})">
                    <span class="item-side-num">${convertToArabicNo(i)}</span>
                    <div class="item-center">
                        <span class="item-main-title">الجُزْءُ ${convertToArabicNo(i)}</span>
                        <span class="item-sub-title">انقر لاستعراض آيات الجزء كاملة</span>
                    </div>
                </div>`;
            }
            area.innerHTML = html;
        }

        function openSurahContent(id, name) {
            currentView = 'surah';
            toggleMushafLayout(true);
            mushafSlider.innerHTML = '<div style="text-align:center; padding:40px;">جاري تحميل الآيات...</div>';

            audioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAUA";
            audioPlayer.play().then(() => audioPlayer.pause()).catch(()=>{});

            fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${id}`)
                .then(r => r.json())
                .then(data => { buildMushafPages(data.verses, name, id); });
        }

        function openJuzContent(juzId) {
            currentView = 'surah';
            toggleMushafLayout(true);
            mushafSlider.innerHTML = '<div style="text-align:center; padding:40px;">جاري تحميل الجزء...</div>';

            audioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAUA";
            audioPlayer.play().then(() => audioPlayer.pause()).catch(()=>{});

            fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?juz_number=${juzId}`)
                .then(r => r.json())
                .then(data => { buildMushafPages(data.verses, `الجزء ${juzId}`, null); });
        }

        function buildMushafPages(verses, title, chapterId) {
            let html = '';
            let versesBuffer = '';
            let lastChapter = null;
            let pageCount = 0;

            verses.forEach((v, index) => {
                let [chStr, vStr] = v.verse_key.split(':');
                let chNum = parseInt(chStr);
                let vNum = parseInt(vStr);
                let text = v.text_uthmani;

                if (!chapterId && chNum !== lastChapter) {
                    lastChapter = chNum;
                    versesBuffer += `<div class="mushaf-surah-title" style="font-size:22px; margin-top:15px;">سُورَةُ ${surahNamesList[chNum-1]}</div>`;
                }

                if (vNum === 1 && text.startsWith("بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ ") && chNum !== 1) {
                    text = text.replace("بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ ", "");
                }

                versesBuffer += `<span class="ayah-span" id="ay-key-${v.verse_key}" 
                                 onclick="handleAyahClick(event, '${v.verse_key}')">${text}<span class="ayah-num">﴿${convertToArabicNo(vNum)}﴾</span></span> `;
                
                if((index + 1) % 5 === 0 || (index + 1) === verses.length) {
                    pageCount++;
                    html += `<div class="mushaf-page">`;
                    if(pageCount === 1 && chapterId) {
                        html += `<div class="mushaf-surah-title">سُورَةُ ${title}</div>`;
                        if(chapterId !== 1 && chapterId !== 9) html += `<span class="bismillah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</span>`;
                    }
                    html += `<div>${versesBuffer}</div></div>`;
                    versesBuffer = '';
                }
            });

            mushafSlider.innerHTML = html;
            mushafSlider.scrollLeft = 0;
            versesElementsArray = Array.from(document.querySelectorAll('.ayah-span'));
            currentVerseIndex = 0;
        }

        function handleAyahClick(e, key) {
            e.stopPropagation();
            let idx = versesElementsArray.findIndex(el => el.id === `ay-key-${key}`);
            if(idx !== -1) {
                currentVerseIndex = idx;
                repeatCounter = 1;
                playAyahAudioStream(key);
            }
        }

        function playAyahAudioStream(key) {
            versesElementsArray.forEach(el => el.classList.remove('active-reciting'));
            
            let el = document.getElementById(`ay-key-${key}`);
            if(el) {
                el.classList.add('active-reciting');
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            audioBar.classList.add('active');
            mainPlayBtn.textContent = "⏳"; 

            let [sIdx, aIdx] = key.split(':');
            let sNum = sIdx.padStart(3, '0');
            let aNum = aIdx.padStart(3, '0');

            document.getElementById('audio-title').textContent = `سورة ${surahNamesList[parseInt(sIdx)-1]} [آية ${convertToArabicNo(aIdx)}]`;

            let audioSrcUrl = `${SUPABASE_STORAGE_URL}${sNum}${aNum}.mp3`;

            audioPlayer.src = audioSrcUrl;
            audioPlayer.load();
            
            audioPlayer.play().then(() => {
                mainPlayBtn.textContent = "⏸️";
            }).catch(err => {
                mainPlayBtn.textContent = "▶️";
                console.log("Supabase Audio Playback Error:", err);
            });
        }

        function togglePlayPause() {
            if(audioPlayer.paused) {
                audioPlayer.play().catch(()=>{});
                mainPlayBtn.textContent = "⏸️";
            } else {
                audioPlayer.pause();
                mainPlayBtn.textContent = "▶️";
            }
        }

        function playNextOrPrevAyah(direction) {
            let targetIndex = currentVerseIndex + direction;
            if (targetIndex >= 0 && targetIndex < versesElementsArray.length) {
                currentVerseIndex = targetIndex;
                repeatCounter = 1;
                let nextKey = versesElementsArray[currentVerseIndex].id.replace('ay-key-', '');
                playAyahAudioStream(nextKey);
            }
        }

        audioPlayer.addEventListener('ended', () => {
            let maxRepeat = parseInt(document.getElementById('verse-repeat-select').value);
            
            if (repeatCounter < maxRepeat) {
                repeatCounter++;
                audioPlayer.currentTime = 0;
                audioPlayer.play().catch(() => {});
            } else {
                if(currentVerseIndex < versesElementsArray.length - 1) {
                    currentVerseIndex++;
                    repeatCounter = 1;
                    let nextKey = versesElementsArray[currentVerseIndex].id.replace('ay-key-', '');
                    playAyahAudioStream(nextKey);
                } else {
                    mainPlayBtn.textContent = "▶️";
                }
            }
        });

        function toggleMushafLayout(show) {
            document.getElementById('main-header').style.display = show ? 'none' : 'flex';
            document.getElementById('main-tabs').style.display = show ? 'none' : 'flex';
            swiperView.style.display = show ? 'none' : 'flex';
            
            document.getElementById('back-button').style.display = show ? 'block' : 'none';
            mushafSlider.style.display = show ? 'flex' : 'none';
        }

        function exitMushafView() {
            currentView = 'index';
            toggleMushafLayout(false);
            audioBar.classList.remove('active');
            audioPlayer.pause();
            mainPlayBtn.textContent = "▶️";
        }

        function convertToArabicNo(num) {
            const ar = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
            return num.toString().split('').map(c => ar[c] || c).join('');
        }
    </script>
</body>
</html>
