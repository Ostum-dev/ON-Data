<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المصحف الشريف</title>
    <style>
        body { font-family: 'Amiri', serif; background: #121212; color: #fff; padding: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: #333; color: white; border: none; cursor: pointer; border-radius: 5px; }
        .tab-content { display: none; }
        .active-tab { display: block; }
        .item { background: #1e1e1e; padding: 12px; margin-bottom: 5px; border-bottom: 1px solid #333; cursor: pointer; display: flex; justify-content: space-between; }
        #view-area { display: none; background: #000; padding: 20px; }
        .ayah { margin-bottom: 15px; font-size: 22px; line-height: 2; }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="tabs">
            <button class="tab-btn" onclick="showTab('surahs')">السور</button>
            <button class="tab-btn" onclick="showTab('parts')">الأجزاء</button>
        </div>

        <div id="surahs" class="tab-content active-tab">
            <div class="item" onclick="loadSurah(1, 'الفاتحة')"><span>١. الفاتحة</span> <small>مكية</small></div>
            <div class="item" onclick="loadSurah(2, 'البقرة')"><span>٢. البقرة</span> <small>مدنية</small></div>
            <div class="item" onclick="loadSurah(3, 'آل عمران')"><span>٣. آل عمران</span> <small>مدنية</small></div>
        </div>

        <div id="parts" class="tab-content">
            <div class="item">الجزء ١ - ٣٠</div>
        </div>
    </div>

    <div id="view-area">
        <h2 id="s-title"></h2>
        <div id="ayahs-container"></div>
        <button onclick="backToList()" style="padding: 10px; width: 100%;">العودة للقائمة</button>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
        }

        async function loadSurah(num, name) {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('view-area').style.display = 'block';
            document.getElementById('s-title').innerText = "سورة " + name;
            
            const res = await fetch(`https://quranapi.pages.dev/api/surah/${num}`);
            const data = await res.json();
            let html = "";
            data.arabic.forEach(a => html += `<p class="ayah">${a.text} ﴿${a.id}﴾</p>`);
            document.getElementById('ayahs-container').innerHTML = html;
        }

        function backToList() {
            document.getElementById('main-ui').style.display = 'block';
            document.getElementById('view-area').style.display = 'none';
        }
    </script>
</body>
</html>
